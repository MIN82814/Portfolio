<main class="projectModal-page">
  <div class="modal-overlay"></div>

  <div class="projectModal">
    <header class="modal-header">
      <button class="modal-close" type="button">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <div class="modal-body">
      <picture class="modal-hero-wrapper">
        <source
          media="(max-width: 767px)"
          srcset=""
          class="modal-hero-mobile"
        />

        <img src="" alt="" class="modal-hero" />
      </picture>

      <div class="modal-text">
        <div
          class="d-flex flex-md-column-reverse justify-content-between align-items-center mb-2"
        >
          <ul
            class="modal-tech-tags breadcrumb d-flex flex-wrap gap-1 justify-content-center"
          ></ul>
          <time class="modal-time text-neutral-500" datetime=""></time>
        </div>

        <div
          class="d-flex flex-md-column justify-content-between align-items-center mb-4"
        >
          <h2 class="modal-title fs-heading-md fs-md-heading-sm mb-md-3"></h2>
          <div class="modal-links d-flex flex-wrap gap-2"></div>
        </div>

        <div class="mb-4">
          <div class="grid gap-md-0">
            <div class="col-5 col-md-8 col-sm-4">
              <div class="modal-intro mb-4">
                <img
                  src=""
                  alt="專案介紹圖"
                  class="modal-intro-img img-fluid rounded mb-3 shadow-sm"
                />
                <h5 class="fs-heading-xxxs mb-2">專案介紹</h5>
                <p class="modal-intro-text"></p>
              </div>
            </div>
            <div class="col-7 col-md-8 col-sm-4">
              <h3 class="fs-heading-xxxs mb-2 text-primary-600">負責內容</h3>
              <ul class="modal-responsibilities ps-4"></ul>
              <div
                class="modal-pages-container mb-3 d-flex flex-wrap gap-2"
              ></div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-content">
        <div class="modal-content-gallery d-flex flex-column gap-7"></div>
      </div>
    </div>
  </div>
</main>
